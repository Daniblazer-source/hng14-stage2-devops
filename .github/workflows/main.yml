name: Stage 2 CI/CD

on:
  push:
    branches: [ main, feat/* ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 pytest httpx fakeredis fastapi redis uvicorn
      - name: Run Unit Tests
        run: pytest api/tests/

  security-scan:
    needs: lint-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image for scan
        run: docker build -t hng-api:${{ github.sha }} ./api
      - name: Run Trivy scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'hng-api:${{ github.sha }}'
          format: 'table'
          exit-code: '0'
          severity: 'CRITICAL,HIGH'

  integration-test:
    needs: security-scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build and Run with Compose
        run: docker compose up --build -d

      - name: Wait for API Readiness
        run: |
          echo "Waiting for API to respond on port 8000..."
          # Active polling: try every 2 seconds for up to 60 seconds
          timeout 60s bash -c 'until curl -s http://localhost:8000/docs > /dev/null; do sleep 2; done'
          echo "API is ready!"

      - name: Verify Application Stack
        run: |
          # 1. Check Frontend
          curl -f http://localhost:3000/ || exit 1

          # 2. Submit Job
          echo "Submitting job..."
          RESPONSE=$(curl -s -X POST http://localhost:3000/submit)
          echo "Frontend response: $RESPONSE"
          
          JOB_ID=$(echo $RESPONSE | jq -r '.job_id // empty')

          if [ -z "$JOB_ID" ] || [ "$JOB_ID" == "null" ]; then
            echo "❌ Integration failed: Job ID is missing."
            docker compose logs api
            docker compose logs frontend
            exit 1
          fi

          echo "✅ Created job $JOB_ID"
          sleep 10 # Wait for worker

          STATUS_DATA=$(curl -s http://localhost:3000/status/$JOB_ID)
          STATUS=$(echo $STATUS_DATA | jq -r '.status')

          echo "📊 Final Status: $STATUS"
          if [[ "$STATUS" == "completed" || "$STATUS" == "queued" ]]; then
            echo "🎉 Test Passed!"
            exit 0
          else
            echo "❌ Test Failed: Status was $STATUS"
            exit 1
          fi

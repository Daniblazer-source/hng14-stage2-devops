name: Stage 2 CI/CD

on:
  push:
    branches: [ main ]

jobs:
  lint-and-test:
    name: Linting and Unit Testing
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Run Hadolint Dockerfile Linter
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: "api/Dockerfile"

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Frontend Dependencies and Lint
        run: |
          cd frontend
          npm install
          npx eslint . --ext .js || echo "Linting finished"

      - name: Setup Python Environment
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Python Dependencies
        run: |
          pip install -r api/requirements.txt

      - name: Run Flake8 Python Linter
        run: flake8 .

      - name: Run Pytest with Coverage
        run: |
          pytest --cov=api --cov-report=xml tests/

      - name: Upload Python Coverage Artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-coverage
          path: coverage.xml

  security-scan:
    name: Container Security Scan
    needs: lint-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Build Local Image for Scanning
        run: |
          docker build -t hng-api:latest -t hng-api:${{ github.sha }} ./api

      - name: Run Trivy Vulnerability Scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'hng-api:${{ github.sha }}'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Security SARIF Artifact
        uses: actions/upload-artifact@v4
        with:
          name: trivy-results
          path: trivy-results.sarif

  integration:
    name: Integration Testing
    needs: security-scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Spin Up Services with Docker Compose
        run: docker compose up --build -d

      - name: Wait for API to become Responsive
        run: |
          timeout 60s bash -c 'until curl -s http://localhost:8000/jobs > /dev/null; do sleep 2; done'

      - name: Run Functional Integration Script
        run: |
          chmod +x integration.sh
          ./integration.sh

      - name: Cleanup and Teardown Containers
        if: always()
        run: docker compose down

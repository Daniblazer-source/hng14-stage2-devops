name: Stage 2 CI/CD

on:
  push:
    branches: [ main ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Run Hadolint (Docker Lint)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: "api/Dockerfile"

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install flake8 pytest pytest-cov httpx fakeredis fastapi redis uvicorn
      
      - name: Run flake8
        run: flake8 .

      - name: Run Unit Tests with Coverage
        run: |
          # Point to the new root tests directory
          pytest --cov=api --cov-report=xml tests/
      
      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        with:
          name: python-coverage
          path: coverage.xml

  security-scan:
    needs: lint-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t hng-api:${{ github.sha }} ./api
      - name: Trivy Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'hng-api:${{ github.sha }}'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
      - name: Upload SARIF
        uses: actions/upload-artifact@v4
        with:
          name: trivy-results
          path: trivy-results.sarif

  integration:
    needs: security-scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Start Services
        run: docker compose up --build -d
      - name: Wait for API
        run: sleep 30
      - name: Run Integration Script
        run: |
          chmod +x integration.sh
          ./integration.sh

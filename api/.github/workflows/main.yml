- name: Wait for API Readiness
        run: |
          echo "Waiting for API to respond on port 8000..."
          # Active polling: try every 2 seconds for up to 60 seconds
          if ! timeout 60s bash -c 'until curl -s http://localhost:8000/jobs > /dev/null; do sleep 2; echo "Still waiting for API..."; done'; then
            echo "❌ API failed to respond. Dumping logs for debugging:"
            docker compose logs api
            docker compose logs redis
            exit 1
          fi
          echo "✅ API is ready!"
